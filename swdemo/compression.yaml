# Response compression for the swdemo HTTPRoute, replacing the Traefik
# compress middleware (zstd, gzip). Applied via an Envoy Gateway
# BackendTrafficPolicy targeting the HTTPRoute.
#
# Order matters: the first compressor wins when Accept-Encoding q-values are
# equal, so Zstd is preferred with Gzip as fallback (matching `zstd,gzip`).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: swdemo-compress
  namespace: swdemo
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: swdemo
  compressor:
    - type: Zstd
    - type: Gzip
