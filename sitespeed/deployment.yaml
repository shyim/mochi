apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitespeed-api
  namespace: sitespeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sitespeed-api
  template:
    metadata:
      labels:
        app: sitespeed-api
    spec:
      serviceAccountName: sitespeed-api
      containers:
        - name: api
          image: ghcr.io/shyim/sitespeed.io-api:0.1.1 # {"$imagepolicy": "flux-system:sitespeed-api"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: sitespeed
          env:
            - name: RUNNER_TYPE
              value: kubernetes
            # Pin the spawned PageSpeed/Lighthouse runner pods to dedicated-vCPU
            # nodes. Those runs time the main thread, so noisy-neighbour CPU
            # contention on a shared node corrupts the scores. Comma-separated
            # key=value node selector; see docs/nodes.md for the label scheme.
            - name: K8S_NODE_SELECTOR
              value: "node.fos.gg/cpu=dedicated"
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4318"
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
