name: deploy

# Example workflow that authenticates to the mochi k3s cluster using GitHub
# Actions OIDC (no long-lived kubeconfig secret) and runs kubectl directly.
#
# The cluster trusts these tokens via host-level structured authentication;
# see docs/github-oidc.md. RBAC for `github:repo:shyim/mochi:ref:refs/heads/main`
# is managed by Flux in infrastructure/github-oidc/rbac.yaml.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # required to request the GitHub OIDC token

env:
  # k3s API server endpoint (must be reachable from GitHub-hosted runners).
  KUBE_API_SERVER: https://mochi.shyim.de:6443
  # Must match an `audiences` entry in docs/k3s-oidc-auth.yaml.
  OIDC_AUDIENCE: https://mochi.shyim.de
  # k3s serves its API with a cert signed by its own private CA, which the
  # runner does not trust by default. Provide that CA so TLS verification can
  # succeed (this is public info, not a secret). Stored as a repo variable:
  #   gh variable set K3S_CA_CERT < server-ca.crt
  # Get the CA on the node from /var/lib/rancher/k3s/server/tls/server-ca.crt,
  # or: openssl s_client -connect mochi.shyim.de:6443 -showcerts </dev/null
  K3S_CA_CERT: ${{ vars.K3S_CA_CERT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to k3s via OIDC
        run: |
          # Request a GitHub OIDC token scoped to our cluster audience.
          TOKEN=$(curl -sSf \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$OIDC_AUDIENCE" \
            | jq -r '.value')

          # Build a kubeconfig with the k3s CA inlined so TLS verification works.
          echo "$K3S_CA_CERT" > /tmp/k3s-ca.crt
          export KUBECONFIG=/tmp/kubeconfig
          kubectl config set-cluster mochi \
            --server="$KUBE_API_SERVER" \
            --certificate-authority=/tmp/k3s-ca.crt \
            --embed-certs=true
          kubectl config set-credentials github-oidc --token="$TOKEN"
          kubectl config set-context mochi --cluster=mochi --user=github-oidc
          kubectl config use-context mochi
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Verify access
        run: |
          kubectl auth whoami
          kubectl get nodes
