apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shopmon-prod
resources:
  - namespace.yaml
  - ../base
  - secret.yaml
  - configmap.yaml
  - db.yaml
  - httproute.yaml
  - httproute-redirect.yaml
images:
  # Release-driven deploys: the shopmon-production ImagePolicy selects the
  # highest semver from release-* tags, and the Flux ImageUpdateAutomation
  # rewrites newTag below (via the $imagepolicy setter marker). Promoting to a
  # new release means cutting a git tag on the shopmon repo, not editing here.
  - name: ghcr.io/friendsofshopware/shopmon
    newTag: release-1.0.5 # {"$imagepolicy": "flux-system:shopmon-production:tag"}
