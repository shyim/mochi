# Scheduled logical dump of the shopmon database, uploaded to the Garage S3
# instance (s3.shyim.de).
#
# Replaces the previous Barman/PITR setup: pg_dump is decoupled from the
# database lifecycle, so a full/unreachable bucket can never block WAL
# recycling and fill the node's disk — worst case is a stale dump.
#
# Retention: Garage has no lifecycle expiration, so the upload step prunes
# dumps older than RETENTION_DAYS after each successful upload.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-dump
  namespace: shopmon-prod
spec:
  # Every 6 hours: dumps are the only recovery mechanism, so the interval is
  # the worst-case data loss (RPO).
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          # Dump first (init container), then upload: guarantees ordering
          # without needing two images merged into one.
          initContainers:
            - name: dump
              image: postgres:18-alpine
              command: ["/bin/sh", "-ec"]
              args:
                - pg_dump -Fc -f "/backup/shopmon-prod-$(date +%Y-%m-%d-%H%M%S).dump"
              env:
                - name: PGHOST
                  value: db
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: shopmon
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: shopmon
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: shopmon
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli:latest
              command: ["/bin/sh", "-ec"]
              # The aws CLI picks up AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/
              # AWS_REGION/AWS_ENDPOINT_URL straight from the secret's env.
              args:
                - |
                  prefix="s3://${AWS_S3_BUCKET_NAME}/shopmon-prod"
                  aws s3 cp /backup/ "$prefix/" --recursive
                  cutoff=$(date -d "$RETENTION_DAYS days ago" +%s)
                  aws s3 ls "$prefix/" | while read -r day time size key; do
                    [ -n "$key" ] || continue
                    if [ "$(date -d "$day $time" +%s)" -lt "$cutoff" ]; then
                      aws s3 rm "$prefix/$key"
                    fi
                  done
              env:
                - name: RETENTION_DAYS
                  value: "7"
              envFrom:
                - secretRef:
                    name: db-backup-s3
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              emptyDir: {}
