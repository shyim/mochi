# CloudNativePG-managed PostgreSQL for shopmon-prod.
#
# Backups: logical dumps (pg_dump) on a schedule, uploaded to the Garage S3
# instance — see db-backup.yaml. No WAL archiving/PITR: a dump-based RPO is
# acceptable here and an unreachable backup target can never pile up WAL on
# disk again (which once filled the storage node and took this cluster down).
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: db
  namespace: shopmon-prod
spec:
  # Two instances so the operator can roll upgrades/restarts: it updates the
  # replica, switches over (~seconds of connection blip), then updates the old
  # primary. Avoids the multi-minute outage a single instance incurs on every
  # image bump or restart-requiring config change.
  #
  # Both pods land on the same (storage) node, so this gives zero-downtime
  # *upgrades*, not node-failure HA. CNPG uses soft pod anti-affinity by
  # default, which permits co-location on one node.
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  # Pin to the storage node. This Cluster uses the default `local-path`
  # StorageClass, whose PVs are node-local hostPath. On a multi-node cluster a
  # rescheduled instance must land back on the node that holds its data dir, or
  # it cannot mount the PVC. Keep all Postgres instances on the labelled
  # storage node (mochi); the other nodes are compute-only.
  affinity:
    nodeSelector:
      topology.fos.gg/role: storage

  # Compress WAL records in-Postgres so fewer 16MB segments are generated,
  # keeping WAL volume churn low.
  postgresql:
    parameters:
      wal_compression: "zstd"

  # The bootstrap below creates the database and owner role from the templated
  # secret.
  bootstrap:
    initdb:
      database: shopmon
      owner: shopmon
      secret:
        name: db-app

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  storage:
    size: 20Gi
  # Dedicated volume for WAL keeps WAL IO isolated from the data dir.
  walStorage:
    size: 4Gi
---
# Stable Service named "db" so the app's DATABASE_URL (@db:5432) keeps working
# unchanged. Points at the current primary via CNPG's role label.
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: shopmon-prod
spec:
  selector:
    cnpg.io/cluster: db
    cnpg.io/instanceRole: primary
  ports:
    - port: 5432
      targetPort: 5432
