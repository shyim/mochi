apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: onepassword
  namespace: shopmon-prod
spec:
  provider:
    onepasswordSDK:
      vault: Shopmon
      auth:
        serviceAccountSecretRef:
          name: op-token
          key: token
      cache:
        ttl: 5m
        maxSize: 100
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shopmon
  namespace: shopmon-prod
spec:
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    # Database
    - secretKey: POSTGRES_DB
      remoteRef:
        key: Shopmon Production/POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: Shopmon Production/POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: Shopmon Production/POSTGRES_PASSWORD
    # App
    - secretKey: APP_SECRET
      remoteRef:
        key: Shopmon Production/APP_SECRET
    - secretKey: SENTRY_DSN
      remoteRef:
        key: Shopmon Production/SENTRY_DSN
    # GitHub OAuth
    - secretKey: APP_OAUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: Shopmon Production/APP_OAUTH_GITHUB_CLIENT_ID
    - secretKey: APP_OAUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: Shopmon Production/APP_OAUTH_GITHUB_CLIENT_SECRET
    # SMTP
    - secretKey: SMTP_HOST
      remoteRef:
        key: Shopmon Production/SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: Shopmon Production/SMTP_PORT
    - secretKey: SMTP_SECURE
      remoteRef:
        key: Shopmon Production/SMTP_SECURE
    - secretKey: SMTP_USER
      remoteRef:
        key: Shopmon Production/SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: Shopmon Production/SMTP_PASS
    # Sitespeed
    - secretKey: APP_SITESPEED_API_KEY
      remoteRef:
        key: Shopmon Production/APP_SITESPEED_API_KEY
    # S3
    - secretKey: APP_S3_ENDPOINT
      remoteRef:
        key: Shopmon Production/APP_S3_ENDPOINT
    - secretKey: APP_S3_ACCESS_KEY_ID
      remoteRef:
        key: Shopmon Production/APP_S3_ACCESS_KEY_ID
    - secretKey: APP_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: Shopmon Production/APP_S3_SECRET_ACCESS_KEY
    - secretKey: APP_S3_BUCKET
      remoteRef:
        key: Shopmon Production/APP_S3_BUCKET
    - secretKey: APP_S3_REGION
      remoteRef:
        key: Shopmon Production/APP_S3_REGION
    # Packages
    - secretKey: PACKAGES_API_TOKEN
      remoteRef:
        key: Shopmon Production/PACKAGES_API_TOKEN
---
# Credentials for the CloudNativePG cluster, templated into the basic-auth
# shape CNPG expects (username/password keys) from the existing 1Password values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-app
  namespace: shopmon-prod
spec:
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: Shopmon Production/POSTGRES_USER
    - secretKey: password
      remoteRef:
        key: Shopmon Production/POSTGRES_PASSWORD
---
# Dedicated S3 credentials/target for database dumps (separate bucket from
# APP_S3_*). Key names match what the aws CLI reads natively from env, so the
# backup CronJob can envFrom this secret without remapping.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-backup-s3
  namespace: shopmon-prod
spec:
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: Shopmon Production/Backup/AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: Shopmon Production/Backup/AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_ENDPOINT_URL
      remoteRef:
        key: Shopmon Production/Backup/AWS_ENDPOINT
    - secretKey: AWS_REGION
      remoteRef:
        key: Shopmon Production/Backup/AWS_REGION
    - secretKey: AWS_S3_BUCKET_NAME
      remoteRef:
        key: Shopmon Production/Backup/AWS_S3_BUCKET_NAME
