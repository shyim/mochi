apiVersion: v1
kind: ConfigMap
metadata:
  name: shopmon-config
  namespace: shopmon-staging
data:
  REDIS_URL: "redis://redis:6379"
  FRONTEND_URL: "https://shopmon.staging.fos.gg"
  MAIL_FROM: "Shopmon <noreply@fos.gg>"
  SMTP_REPLY_TO: "noreply@fos.gg"
  APP_SITESPEED_ENDPOINT: "https://sitespeed.fos.gg"
  APP_SITESPEED_PREFIX: "shopmon-staging-"
  PACKAGES_API_URL: "https://packages.staging.fos.gg"
  OTEL_DEPLOYMENT_ENVIRONMENT: "staging"
  # chimiddleware.ClientIPFromXFF trusts these CIDRs as proxy hops in
  # X-Forwarded-For; the real client IP is the first hop NOT in this list.
  # k3s default pod CIDR (Envoy Gateway pod is the immediate hop).
  TRUSTED_PROXIES: "10.42.0.0/16"
