# CloudNativePG-managed PostgreSQL for shopmon-staging.
#
# Replaces the previous plain postgres:18.3 Deployment + db-data PVC.
# Backups: logical dumps (pg_dump) on a schedule, uploaded to Backblaze B2 —
# see db-backup.yaml. No WAL archiving/PITR: a dump-based RPO is acceptable
# here and an unreachable backup target can never pile up WAL on disk again.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: db
  namespace: shopmon-staging
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  # Pin to the storage node. This Cluster uses the default `local-path`
  # StorageClass, whose PVs are node-local hostPath. On a multi-node cluster a
  # rescheduled instance must land back on the node that holds its data dir, or
  # it cannot mount the PVC. Keep all Postgres instances on the labelled
  # storage node (mochi); the other nodes are compute-only.
  affinity:
    nodeSelector:
      topology.fos.gg/role: storage

  # Compress WAL records in-Postgres so fewer 16MB segments are generated,
  # keeping WAL volume churn low.
  postgresql:
    parameters:
      wal_compression: "zstd"

  # Reuse the app's existing credentials/database name. The bootstrap below
  # creates the database and owner role from the templated secret.
  bootstrap:
    initdb:
      database: shopmon
      owner: shopmon
      secret:
        name: db-app

  # Roughly matches the previous Deployment's resource envelope.
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  storage:
    size: 10Gi
  # Dedicated volume for WAL keeps WAL IO isolated from the data dir.
  walStorage:
    size: 2Gi
---
# Stable Service named "db" so the app's DATABASE_URL (@db:5432) keeps working
# unchanged. Points at the current primary via CNPG's role label.
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: shopmon-staging
spec:
  selector:
    cnpg.io/cluster: db
    cnpg.io/instanceRole: primary
  ports:
    - port: 5432
      targetPort: 5432
