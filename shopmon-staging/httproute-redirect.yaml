# Redirects plain HTTP to HTTPS for shopmon.staging.fos.gg.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shopmon-staging-redirect
  namespace: shopmon-staging
spec:
  parentRefs:
    - name: eg
      namespace: default
      sectionName: staging-fos-gg-http
  hostnames:
    - shopmon.staging.fos.gg
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
