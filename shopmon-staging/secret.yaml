apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: onepassword
  namespace: shopmon-staging
spec:
  provider:
    onepasswordSDK:
      vault: Shopmon
      auth:
        serviceAccountSecretRef:
          name: op-token
          key: token
      cache:
        ttl: 5m
        maxSize: 100
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shopmon
  namespace: shopmon-staging
spec:
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    creationPolicy: Owner
  data:
    # Database
    - secretKey: POSTGRES_DB
      remoteRef:
        key: Shopmon Staging/POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: Shopmon Staging/POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: Shopmon Staging/POSTGRES_PASSWORD
    # App
    - secretKey: APP_SECRET
      remoteRef:
        key: Shopmon Staging/APP_SECRET
    - secretKey: SENTRY_DSN
      remoteRef:
        key: Shopmon Staging/SENTRY_DSN
    # GitHub OAuth
    - secretKey: APP_OAUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: Shopmon Staging/APP_OAUTH_GITHUB_CLIENT_ID
    - secretKey: APP_OAUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: Shopmon Staging/APP_OAUTH_GITHUB_CLIENT_SECRET
    # SMTP
    - secretKey: SMTP_HOST
      remoteRef:
        key: Shopmon Staging/SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: Shopmon Staging/SMTP_PORT
    - secretKey: SMTP_SECURE
      remoteRef:
        key: Shopmon Staging/SMTP_SECURE
    - secretKey: SMTP_USER
      remoteRef:
        key: Shopmon Staging/SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: Shopmon Staging/SMTP_PASS
    # Sitespeed
    - secretKey: APP_SITESPEED_API_KEY
      remoteRef:
        key: Shopmon Staging/APP_SITESPEED_API_KEY
    # S3
    - secretKey: APP_S3_ENDPOINT
      remoteRef:
        key: Shopmon Staging/APP_S3_ENDPOINT
    - secretKey: APP_S3_ACCESS_KEY_ID
      remoteRef:
        key: Shopmon Staging/APP_S3_ACCESS_KEY_ID
    - secretKey: APP_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: Shopmon Staging/APP_S3_SECRET_ACCESS_KEY
    - secretKey: APP_S3_BUCKET
      remoteRef:
        key: Shopmon Staging/APP_S3_BUCKET
    - secretKey: APP_S3_REGION
      remoteRef:
        key: Shopmon Staging/APP_S3_REGION
    # Packages
    - secretKey: PACKAGES_API_TOKEN
      remoteRef:
        key: Shopmon Staging/PACKAGES_API_TOKEN
