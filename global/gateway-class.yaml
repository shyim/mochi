# GatewayClass for Envoy Gateway, parameterized by the `dual-stack` EnvoyProxy
# config below. All Gateways reference this class via `gatewayClassName: eg`.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: dual-stack
    namespace: envoy-gateway-system
---
# EnvoyProxy fleet config for the GatewayClass.
#
# Two settings here are required for IPv6 to work on this dual-stack cluster:
#
#   1. spec.ipFamily: DualStack
#      Envoy Gateway defaults to IPv4-only, which makes Envoy bind its
#      listeners to 0.0.0.0 only. Without this, IPv6 clients get
#      "connection refused" even though the LB Service advertises a v6 address.
#
#   2. envoyService patch -> ipFamilyPolicy: PreferDualStack + ipFamilies
#      Makes the generated LoadBalancer Service dual-stack so k3s ServiceLB
#      (klipper) exposes both the v4 and v6 node addresses. Envoy Gateway
#      otherwise creates a SingleStack IPv4 Service.
#
# externalTrafficPolicy: Local preserves the client source IP. With `Cluster`,
# k3s ServiceLB (klipper) SNATs the connection to a node/pod IP before it
# reaches Envoy, so Envoy never sees the real client and can't populate
# X-Forwarded-For (breaking TRUSTED_PROXIES-based client-IP resolution in apps).
# `Local` skips that SNAT, but only serves traffic on nodes that actually run an
# Envoy pod — traffic to a node without one is dropped. So Envoy runs as a
# DaemonSet (one pod per node) and DNS for *.fos.gg points at BOTH node IPs
# (mochi 162.55.47.201 + dango 159.195.30.237). Every ingress IP then has a
# local Envoy to serve it, giving HA ingress with the real client IP preserved.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: dual-stack
  namespace: envoy-gateway-system
spec:
  ipFamily: DualStack
  provider:
    type: Kubernetes
    kubernetes:
      # Run Envoy as a DaemonSet so every node has a local data plane. k3s
      # ServiceLB (klipper) binds hostPort 80/443 on each node running an Envoy
      # pod, so both node public IPs serve ingress. Combined with
      # externalTrafficPolicy: Local (below) this preserves the client source IP
      # on every node — there is no node without a local Envoy to drop traffic.
      # No nodeSelector: we want Envoy on all nodes, including mochi.shyim.de
      # which only resolves to mochi (still covered by the per-node pod there).
      envoyDaemonSet:
        pod: {}
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Local
        patch:
          type: StrategicMerge
          value:
            spec:
              ipFamilyPolicy: PreferDualStack
              ipFamilies:
                - IPv4
                - IPv6
