# DNS-01 ClusterIssuer for wildcard certificates (*.fos.gg, *.staging.fos.gg).
# Wildcards cannot be validated via HTTP-01, so this uses Cloudflare DNS-01.
#
# Requires a Cloudflare API token in the cert-manager namespace:
#   kubectl create secret generic cloudflare-api-token -n cert-manager \
#     --from-literal=api-token='<scoped token: Zone>DNS>Edit on fos.gg>'
#
# The existing letsencrypt-prod (HTTP-01 gatewayHTTPRoute) issuer is left intact
# for any non-wildcard certs.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    email: mochi@shyim.de
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
