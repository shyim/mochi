apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: datadog-operator
  namespace: flux-system
spec:
  interval: 10m
  releaseName: datadog-operator
  targetNamespace: datadog-operator
  storageNamespace: datadog-operator
  chart:
    spec:
      chart: datadog-operator
      version: 2.22.2
      sourceRef:
        kind: HelmRepository
        name: datadog
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # DatadogAgent/default/datadog lives in the default namespace. The chart
    # defaults WATCH_NAMESPACE to the operator pod namespace, so make the
    # operator cluster-scoped for this single-cluster install.
    watchNamespaces:
      - ""

