---
# Scans GHCR for available tags of the swdemo Shopware demo image.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: swdemo-shopware
  namespace: flux-system
spec:
  image: ghcr.io/friendsofshopware/shopware-demo-environment
  interval: 1h0m0s
---
# Selects the newest 6.7.x patch release. Stays on the 6.7 minor; a move to
# 6.8 would be an intentional bump to this range.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: swdemo-shopware
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: swdemo-shopware
  policy:
    semver:
      range: ">=6.7.0 <6.8.0"
---
# Scans GHCR for available tags of the sitespeed API image.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: sitespeed-api
  namespace: flux-system
spec:
  image: ghcr.io/shyim/sitespeed.io-api
  interval: 1h0m0s
---
# Selects the newest 0.1.x patch release. Pre-1.0, so each 0.x minor may carry
# breaking changes; moving to 0.2 is an intentional bump to this range rather
# than an automatic registry-driven push to main.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: sitespeed-api
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: sitespeed-api
  policy:
    semver:
      range: ">=0.1.0 <0.2.0"
---
# Scans GHCR for available tags of the shopmon app image. Shared by the
# staging and production policies below.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: shopmon
  namespace: flux-system
spec:
  image: ghcr.io/friendsofshopware/shopmon
  interval: 5m0s
---
# Staging tracks the newest main build. CI tags every push to main as
# main-<unix-timestamp>-<sha>; the embedded timestamp is extracted and sorted
# numerically so the most recent build always wins. Auto-deploys on merge.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: shopmon-staging
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: shopmon
  filterTags:
    pattern: '^main-(?P<ts>\d+)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
---
# Production tracks tagged releases. Cutting a git tag vX.Y.Z on the shopmon
# repo builds a release-X.Y.Z image; the semver range selects it. Promotion is
# a deliberate release, not an automatic registry-driven push.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: shopmon-production
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: shopmon
  filterTags:
    pattern: '^release-(?P<ver>.+)$'
    extract: '$ver'
  policy:
    semver:
      range: ">=0.0.0"
---
# Writes image tag bumps back to main. Targets all files carrying an
# $imagepolicy marker (swdemo/deployment.yaml, sitespeed/deployment.yaml,
# apps/shopmon/{staging,production}/kustomization.yaml).
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 30m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: |
        chore: update images

        {{ range .Changed.Changes -}}
        - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./
    strategy: Setters
