apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m
  releaseName: external-secrets
  targetNamespace: external-secrets
  storageNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: 2.5.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
