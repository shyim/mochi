# RBAC for GitHub Actions OIDC identities.
#
# The k3s API server is configured (via host-level structured authentication,
# see docs/github-oidc.md) to accept GitHub Actions OIDC tokens. Each token's
# `sub` claim is mapped to a Kubernetes username with the prefix `github:`, e.g.
#
#   sub: repo:shyim/mochi:ref:refs/heads/main
#   ->  username: github:repo:shyim/mochi:ref:refs/heads/main
#
# Only the `main` branch of this repository is granted cluster-admin. Add more
# bindings below for additional branches / GitHub Environments as needed.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-oidc-mochi-main
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: github-oidc
subjects:
  - kind: User
    name: "github:repo:shyim/mochi:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
# FriendsOfShopware/shopmon (main branch) may restart the `api` deployment in
# the shopmon-staging namespace and nothing else. `kubectl rollout restart`
# patches the pod-template annotation, and `rollout status` reads the
# deployment + its replicasets/pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-oidc-rollout-restart
  namespace: shopmon-staging
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: github-oidc
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-oidc-shopmon-restart
  namespace: shopmon-staging
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: github-oidc
subjects:
  - kind: User
    name: "github:repo:FriendsOfShopware/shopmon:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: github-oidc-rollout-restart
  apiGroup: rbac.authorization.k8s.io
