apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
  namespace: flux-system
spec:
  dependsOn:
    - name: cloudnative-pg
  interval: 10m
  releaseName: plugin-barman-cloud
  targetNamespace: cnpg-system
  storageNamespace: cnpg-system
  chart:
    spec:
      chart: plugin-barman-cloud
      version: 0.6.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
