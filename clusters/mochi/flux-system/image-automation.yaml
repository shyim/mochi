---
# Scans GHCR for available tags of the swdemo Shopware demo image.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: swdemo-shopware
  namespace: flux-system
spec:
  image: ghcr.io/friendsofshopware/shopware-demo-environment
  interval: 1h0m0s
---
# Selects the newest 6.7.x patch release. Stays on the 6.7 minor; a move to
# 6.8 would be an intentional bump to this range.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: swdemo-shopware
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: swdemo-shopware
  policy:
    semver:
      range: ">=6.7.0 <6.8.0"
---
# Writes image tag bumps back to main. Targets only files carrying an
# $imagepolicy marker (currently swdemo/deployment.yaml).
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 30m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: |
        chore: update images

        {{ range .Changed.Changes -}}
        - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./
    strategy: Setters
